<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 Gewinnt - Connect Four</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎮 4 Gewinnt 🎮</h1>
        
        <div class="game-info">
            <div class="player-turn">
                <span id="current-player">Spieler 1</span> ist am Zug
            </div>
            <div class="player-indicator">
                <div class="piece player1" id="turn-indicator"></div>
            </div>
        </div>

        <div id="board" class="board">
            <!-- Columns will be generated by JavaScript -->
        </div>

        <div class="game-controls">
            <button id="reset-btn" class="btn">Neues Spiel</button>
        </div>

        <div id="winner-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="winner-text">Gewinner!</h2>
                <button id="play-again-btn" class="btn">Noch einmal spielen</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
